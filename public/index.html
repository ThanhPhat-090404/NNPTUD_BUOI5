<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User & Role Management</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">System Admin</a>
  </div>
</nav>

<div class="container mb-5">
  <!-- Nav tabs -->
  <ul class="nav nav-tabs" id="myTab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#users" type="button" role="tab">Users</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="roles-tab" data-bs-toggle="tab" data-bs-target="#roles" type="button" role="tab">Roles</button>
    </li>
  </ul>

  <!-- Tab panes -->
  <div class="tab-content pt-4" id="myTabContent">
    
    <!-- USERS TAB -->
    <div class="tab-pane fade show active" id="users" role="tabpanel">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>User Management</h3>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#userModal" onclick="userUI.openCreateModal()">
          <i class="bi bi-person-plus-fill"></i> Add User
        </button>
      </div>

      <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Avatar</th>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- Render via JS -->
            <tr><td colspan="6" class="text-center py-4">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ROLES TAB -->
    <div class="tab-pane fade" id="roles" role="tabpanel">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Role Management</h3>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#roleModal" onclick="roleUI.openCreateModal()">
          <i class="bi bi-shield-plus"></i> Add Role
        </button>
      </div>

      <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Role Name</th>
              <th>Description</th>
              <th>Created At</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="roleTableBody">
            <!-- Render via JS -->
            <tr><td colspan="4" class="text-center py-4">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ================= MODALS ================= -->

<!-- USER MODAL -->
<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="userForm" onsubmit="userUI.handleSubmit(event)">
        <div class="modal-header">
          <h5 class="modal-title" id="userModalTitle">Add User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="userId">
          <div class="mb-3">
            <label class="form-label">Username *</label>
            <input type="text" class="form-control" id="formUsername" required>
          </div>
          <div class="mb-3" id="pwdGroup">
            <label class="form-label">Password *</label>
            <input type="password" class="form-control" id="formPassword">
            <small class="text-muted" id="pwdHelp" style="display:none">Bỏ trống nếu không muốn đổi pass</small>
          </div>
          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" id="formEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="formFullName">
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" id="formUserRole">
              <option value="">-- No Role --</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-primary">Save changes</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ROLE MODAL -->
<div class="modal fade" id="roleModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="roleForm" onsubmit="roleUI.handleSubmit(event)">
        <div class="modal-header">
          <h5 class="modal-title" id="roleModalTitle">Add Role</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="roleId">
          <div class="mb-3">
            <label class="form-label">Role Name *</label>
            <input type="text" class="form-control" id="formRoleName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="formRoleDesc" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-primary">Save changes</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ENABLE/DISABLE STATUS MODAL -->
<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <form id="statusForm" onsubmit="userUI.handleStatusSubmit(event)">
        <div class="modal-header">
          <h5 class="modal-title">Change Status</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="statusUserId">
          <p class="mb-2">Type email + username to confirm:</p>
          <input type="email" class="form-control mb-2" id="statusEmail" placeholder="Email" required>
          <input type="text" class="form-control mb-3" id="statusUsername" placeholder="Username" required>
          
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="statusToggle">
            <label class="form-check-label" for="statusToggle">Active</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm">Confirm</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Bootstrap JS Bundle-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="/js/api.js"></script>
<script src="/js/roles.js"></script>
<script src="/js/users.js"></script>
<script>
  // Init
  document.addEventListener('DOMContentLoaded', () => {
    roleUI.loadRoles();
    userUI.loadUsers();
  });
</script>

</body>
</html>
